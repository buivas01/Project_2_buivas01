name: Deploy Footwear Classification

on:
  push:
    branches: [ main ]
    paths:
      - 'djl-footwear-classification/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image (linux/amd64)
        uses: docker/build-push-action@v5
        with:
          context: ./djl-footwear-classification
          platforms: linux/amd64
          push: true
          tags: kyruu17/djl-footwear-classification:latest

      - name: Trigger Azure deployment via webhook
        run: curl -s -X POST "${{ secrets.AZURE_WEBHOOK_FOOTWEAR }}"
